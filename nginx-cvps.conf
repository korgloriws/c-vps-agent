# Proxy do agente na porta 80 (path /cvps/)
# Dentro do server { } do nginx — ANTES do location / do finmas.
#
# Nginx no HOST:     proxy_pass http://127.0.0.1:9876/;
# Nginx no DOCKER:   proxy_pass http://172.17.0.1:9876/;
# Mesma rede docker: proxy_pass http://c-vps-agent:9876/;
location /cvps/ {
    proxy_pass http://172.17.0.1:9876/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
}
